  <title>Télécharger Jambo Taxi</title>
  <meta name="description" content="Téléchargez l'application Jambo Taxi sur Android ou iOS." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 36px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .logo {
      width: 130px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .tagline {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin-bottom: 28px;
    }

    /* Download buttons */
    .btn {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      padding: 18px 24px;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-android {
      background: #E5362C;
      color: #fff;
      box-shadow: 0 8px 24px rgba(229,54,44,0.3);
    }
    .btn-android:hover { box-shadow: 0 12px 32px rgba(229,54,44,0.45); }

    .btn-ios {
      background: #1a1a1a;
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .btn-ios:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.28); }

    .btn-icon { width: 26px; height: 26px; flex-shrink: 0; }
    .btn-label { display: flex; flex-direction: column; align-items: flex-start; }
    .btn-sub  { font-size: 0.68rem; font-weight: 500; opacity: 0.75; line-height: 1; margin-bottom: 2px; }
    .btn-name { font-size: 1rem; font-weight: 800; line-height: 1; }

    body.os-android .btn-android { display: flex; }
    body.os-ios     .btn-ios     { display: flex; }
    body.os-other   .btn-android { display: flex; margin-bottom: 12px; }
    body.os-other   .btn-ios     { display: flex; }

    @media (max-width: 440px) {
      .card { padding: 36px 20px 32px; }
    }
  </style>
</head>

<script>
  (function () {
    const ua = navigator.userAgent || '';
    const isAndroid = /android/i.test(ua);
    const isIOS = /iphone|ipad|ipod/i.test(ua) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isAndroid) {
      document.body.classList.add('os-android');
    } else if (isIOS) {
      document.body.classList.add('os-ios');
    } else {
      document.body.classList.add('os-other');
    }
  })();
</script>
